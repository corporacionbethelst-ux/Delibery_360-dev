version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: delivery360-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Soporte
      POSTGRES_DB: delivery360
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - delivery360-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: delivery360-redis
    restart: unless-stopped
    command: redis-server --requirepass changeme123
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - delivery360-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "changeme123", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delivery360-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://:changeme123@redis:6379/0
      CELERY_BROKER_URL: redis://:changeme123@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:changeme123@redis:6379/0
    volumes:
      - ./app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - delivery360-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: delivery360-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_WS_URL: ws://backend:8000/ws
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - delivery360-network

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delivery360-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://:changeme123@redis:6379/0
      CELERY_BROKER_URL: redis://:changeme123@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:changeme123@redis:6379/0
    volumes:
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - delivery360-network
    command: celery -A app.workers.celery_app worker --loglevel=info

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delivery360-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://:changeme123@redis:6379/0
      CELERY_BROKER_URL: redis://:changeme123@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:changeme123@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - delivery360-network
    command: celery -A app.workers.celery_app beat --loglevel=info

networks:
  delivery360-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: