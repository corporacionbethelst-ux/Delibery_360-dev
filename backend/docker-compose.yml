version: '3.8'

services:
  # 1. BASE DE DATOS: PostgreSQL
  # Guarda toda la información persistente (usuarios, pedidos, historial)
  db:
    image: postgres:16-alpine
    container_name: delivery360_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Soporte
      POSTGRES_DB: delivery360
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persistencia: si apagas el docker, los datos no se borran
    ports:
      - "5432:5432"
    networks:
      - delivery_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. COLA DE MENSAJES: Redis
  # Maneja la velocidad: notificaciones en tiempo real, caché y tareas asíncronas
  redis:
    image: redis:7-alpine
    container_name: delivery360_redis
    ports:
      - "6379:6379"
    networks:
      - delivery_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. BACKEND: FastAPI (Python)
  # La lógica de negocio. Se conecta a DB y Redis.
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delivery360_api
    command: >
      sh -c "python -m wait_for db:5432 -- python -m wait_for redis:6379 -- 
             alembic upgrade head && 
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app # Montamos el código para que los cambios se reflejen sin reiniciar (Hot Reload)
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:Soporte@db:5432/delivery360
      REDIS_URL: redis://redis:6379
      SECRET_KEY: super_secret_key_change_in_production_12345
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - delivery_network

  # 4. FRONTEND: Next.js (React)
  # Lo que ve el usuario. Se conecta al Backend.
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: delivery360_web
    command: npm run dev
    volumes:
      - ../frontend:/app
      - /app/node_modules # Evita sobrescribir las dependencias instaladas dentro del contenedor
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_MAPS_PROVIDER: leaflet
    depends_on:
      - backend
    networks:
      - delivery_network

networks:
  delivery_network:
    driver: bridge

volumes:
  postgres_data: