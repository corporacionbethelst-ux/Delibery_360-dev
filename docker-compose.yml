version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: delivery360_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: delivery360
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - delivery_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d delivery360"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: delivery360_redis
    ports:
      - "6379:6379"
    networks:
      - delivery_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: delivery360_api
    # Usamos wait-for-it correcto y luego migraciones + servidor
    command: >
      sh -c "wait-for-it db:5432 --timeout=30 --strict -- 
             wait-for-it redis:6379 --timeout=30 --strict -- 
             alembic upgrade head && 
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:admin123@db:5432/delivery360
      REDIS_URL: redis://redis:6379
      SECRET_KEY: super_secret_key_change_in_production_12345
      ENVIRONMENT: development
      PROJECT_NAME: Delivery360
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - delivery_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: delivery360_web
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_MAPS_PROVIDER: leaflet
    depends_on:
      - backend
    networks:
      - delivery_network

networks:
  delivery_network:
    driver: bridge

volumes:
  postgres_data: